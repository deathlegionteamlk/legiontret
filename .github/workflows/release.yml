name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -ldflags="-s -w -X github.com/deathlegionteam/legiontret/internal/config.Version=${{ github.ref_name }}" \
            -o "dist/legiontret-${{ matrix.suffix }}${ext}" \
            ./cmd/legiontret

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: legiontret-${{ matrix.suffix }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create SHA256 checksums
        run: |
          cd dist
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true
          body: |
            ## LegionTret by Death Legion Team

            Run open-source LLMs locally. Simple. Fast. Free.

            ### Install

            **macOS / Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/deathlegionteam/legiontret/main/scripts/install.sh | sh
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/deathlegionteam/legiontret/main/scripts/install.ps1 | iex
            ```

            ### Quick Start
            ```bash
            legiontret run gemma3       # Run Gemma 3
            legiontret run llama3       # Run Llama 3
            legiontret run mistral      # Run Mistral
            ```

            ### Supported Models
            Llama 3/3.1/3.2, Gemma 2/3, Mistral/Nemo/Mixtral, Qwen 2.5, DeepSeek R1, Phi-3/4, Code Llama, and many more!

            ### Docker
            ```bash
            docker compose up -d
            ```

            ### API
            ```bash
            curl http://localhost:11434/api/tags
            ```
          draft: false
          prerelease: false

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/deathlegionteam/legiontret:latest
            ghcr.io/deathlegionteam/legiontret:${{ github.ref_name }}
          platforms: linux/amd64,linux/arm64
